name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
      NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
      NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          test -n "$P12_BASE64"
          test -n "$P12_PASSWORD"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/localvoice-signing.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare notarization key
        run: |
          test -n "$NOTARY_KEY_BASE64"
          test -n "$NOTARY_KEY_ID"
          test -n "$NOTARY_ISSUER_ID"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Build whisper framework
        run: |
          mkdir -p "$HOME/LocalVoice-Dependencies"
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git "$HOME/LocalVoice-Dependencies/whisper.cpp"
          cd "$HOME/LocalVoice-Dependencies/whisper.cpp"
          ./build-xcframework.sh

      - name: Build LocalVoice
        run: |
          xcodebuild \
            -project LocalVoice.xcodeproj \
            -scheme LocalVoice \
            -configuration Release \
            -derivedDataPath .release-build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Sign, notarize, and staple DMG
        run: |
          chmod +x scripts/create-dmg.sh scripts/sign-notarize-dmg.sh
          DEVELOPER_ID_APPLICATION="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -1)" \
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8" \
          scripts/sign-notarize-dmg.sh \
            .release-build/Build/Products/Release/LocalVoice.app \
            "LocalVoice-${GITHUB_REF_NAME}.dmg"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "LocalVoice $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" \
            "LocalVoice-${GITHUB_REF_NAME}.dmg" \
            "LocalVoice-${GITHUB_REF_NAME}.dmg.sha256" \
            --clobber
